<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cheryl W. Media</title>

<style>
body{
background:black;
color:white;
font-family:Arial, Helvetica, sans-serif;
margin:0;
padding:60px;
}

h1{
font-weight:300;
letter-spacing:3px;
margin-bottom:60px;
text-align:center;
}

.gallery{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
max-width:1600px;
margin:auto;
align-items:start;
}

.video-card{
display:flex;
flex-direction:column;
}

.video-card h2{
font-size:14px;
font-weight:400;
letter-spacing:1px;
margin-bottom:10px;
text-align:center;
}

.video-frame{
width:100%;
aspect-ratio:9/16;
background:black;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.video-frame video{
width:100%;
height:100%;
object-fit:contain;
background:black;
}
</style>
</head>

<body>

<h1>Cheryl W. Media</h1>

<div class="gallery">

  <div class="video-card">
    <h2>Lighting Intro</h2>
    <div class="video-frame">
      <video controls>
        <source src="lighting_intro.mp4" type="video/mp4">
      </video>
    </div>
  </div>

  <div class="video-card">
    <h2>Lighting – Shooting Star</h2>
    <div class="video-frame">
      <video controls>
        <source src="lighting_shootingstar.mp4" type="video/mp4">
      </video>
    </div>
  </div>

  <div class="video-card">
    <h2>Lighting – Mingming</h2>
    <div class="video-frame">
      <video controls>
        <source src="lighting_mingming.mp4" type="video/mp4">
      </video>
    </div>
  </div>

  <div class="video-card">
    <h2>Motion – SOS</h2>
    <div class="video-frame">
      <video controls>
        <source src="motion_sos.mp4" type="video/mp4">
      </video>
    </div>
  </div>

</div>

</body>
</html>
